name: Release

# Publish a downloadable .mcpb desktop-extension bundle whenever a version tag
# is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune to production dependencies
        run: npm prune --omit=dev

      # WORKAROUND: repack with STORED (uncompressed) entries to avoid a silent
      # deadlock in yauzl 2.x + Node 24 on Claude Desktop 1.12603.1.
      # Revert once upstream fixes the issue:
      # https://github.com/anthropics/claude-code/issues/67865
      - name: Pack .mcpb bundle
        run: npm run pack:safe

      - name: Upload bundle to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yahoo-fantasy-baseball-v*.mcpb
          generate_release_notes: true
          fail_on_unmatched_files: true
