name: Release

# On a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`):
#   - `release`     uploads the .mcpb desktop-extension bundle to the GitHub Release
#   - `publish-npm` publishes to npm via OIDC trusted publishing — no token (so
#                   `npx yahoo-fantasy-baseball-mcp` works for any MCP client)
# The two jobs are independent; a hiccup in one does not block the other.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune to production dependencies
        run: npm prune --omit=dev

      # WORKAROUND: repack with STORED (uncompressed) entries to avoid a silent
      # deadlock in yauzl 2.x + Node 24 on Claude Desktop 1.12603.1.
      # Revert once upstream fixes the issue:
      # https://github.com/anthropics/claude-code/issues/67865
      - name: Pack .mcpb bundle
        run: npm run pack:safe

      # The Fantasy Roster Review skill ships as a ZIP so Claude Desktop users
      # can upload it via Customize → Skills (the .mcpb cannot carry skills, and
      # `npx skills add` only targets CLI agents like Claude Code / Codex).
      - name: Pack roster review skill
        run: npm run pack:skill

      - name: Upload bundle and skill to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yahoo-fantasy-baseball-v*.mcpb
            fantasy-roster-review-skill.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # lets npm mint a short-lived publish credential via OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted publishing (OIDC) needs npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # No token: npm exchanges GitHub's OIDC id-token for a short-lived
      # credential via the trusted publisher configured on npmjs.com, and
      # attaches build provenance automatically. `prepublishOnly` builds dist/
      # first; fails loudly if this version is already on npm — which lines up
      # with the dedicated version-bump commit convention.
      - name: Publish to npm
        run: npm publish
